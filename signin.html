<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Zach's Big Move Out Blow Out Sale Event Day</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="modern-bg">
    <header class="topbar">
      <a class="brand" href="/signin">Zach's Big Move Out Blow Out Sale Event Day</a>
      <nav class="top-actions">
        <a class="ghost-link" href="/">Buyer Page</a>
        <a class="ghost-link" href="/seller">Seller Page</a>
      </nav>
    </header>

    <main class="layout-single auth-layout">
      <section class="panel">
        <h1>Welcome! Sign in or create an account.</h1>
        <p class="muted">
          Use your email (including Gmail) to access buyer and seller tools.
        </p>
      </section>

      <section class="panel auth-grid">
        <div>
          <h2>Create Account</h2>
          <form id="signup-form" class="stack-form">
            <label>
              Email
              <input type="email" id="signup-email" required />
            </label>
            <label>
              Password
              <input type="password" id="signup-password" minlength="8" required />
            </label>
            <label>
              Display Name
              <input type="text" id="signup-display-name" required />
            </label>
            <label>
              Phone (optional)
              <input type="tel" id="signup-phone" />
            </label>
            <label>
              Account Type
              <select id="signup-role" required>
                <option value="buyer">Buyer</option>
                <option value="seller">Seller</option>
              </select>
            </label>
            <button type="submit" class="btn-primary">Create Account</button>
            <p id="signup-message" class="inline-message"></p>
          </form>
        </div>

        <div>
          <h2>Sign In</h2>
          <form id="signin-form" class="stack-form">
            <label>
              Email
              <input type="email" id="signin-email" required />
            </label>
            <label>
              Password
              <input type="password" id="signin-password" required />
            </label>
            <button type="submit" class="primary-btn">Sign In</button>
            <p id="signin-message" class="inline-message"></p>
          </form>
        </div>
      </section>
    </main>

    <script src="signin.js"></script>
  </body>
</html>
